version: '3.8'

services:
  wealthfolio:
    image: ghcr.io/afadil/wealthfolio:latest
    container_name: wealthfolio
    restart: unless-stopped
    volumes:
      - wealthfolio-data:/data
    env_file:
      - .env.docker
    networks:
      - wealthfolio-network

  nginx:
    image: nginx:alpine
    container_name: wealthfolio-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - wealthfolio
    networks:
      - wealthfolio-network

volumes:
  wealthfolio-data:
    driver: local

networks:
  wealthfolio-network:
    driver: bridge